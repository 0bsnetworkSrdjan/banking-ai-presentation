# Build the Vite site in sites/unicredit-rs and deploy to GitHub Pages.
# Repository Settings → Pages → Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Use Node 24 for JavaScript actions (GitHub-hosted runners; see GH changelog Apr 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sites/unicredit-rs/package-lock.json

      - name: Install dependencies
        working-directory: sites/unicredit-rs
        run: npm ci

      - name: Set base path for GitHub Pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "VITE_BASE_URL=/${REPO_NAME}/" >> "$GITHUB_ENV"

      - name: Build
        working-directory: sites/unicredit-rs
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: sites/unicredit-rs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
